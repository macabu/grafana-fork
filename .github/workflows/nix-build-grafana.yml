name: Nix build Grafana

on:
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

permissions: {}

jobs:
  # Evaluate the flake, show its output tree, and DERIVE the build matrices.
  discover:
    name: Evaluate flake & derive matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      targets: ${{ steps.matrix.outputs.targets }}
      packages: ${{ steps.matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Show every output the flake produces
        run: nix flake show
      - name: Check the flake evaluates for all host systems
        run: nix flake check --no-build --all-systems
      - name: Derive the build matrices from the flake
        id: matrix
        run: |
          set -euo pipefail
          attrs="$(nix eval --json '.#packages.x86_64-linux' --apply builtins.attrNames)"
          # build targets: every tar.gz, as a bare suffix (e.g. "linux-arm64").
          targets="$(jq -c '[.[] | select(startswith("targz-")) | sub("^targz-"; "")]' <<<"$attrs")"
          # packages: {attr, target} so each can restore its target's caches.
          packages="$(jq -c '[.[] | select(startswith("deb-") or startswith("rpm-")) | {attr: ., target: sub("^(deb|rpm)-"; "")}]' <<<"$attrs")"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "build targets: $targets"
          echo "package targets: $packages"

  # Built ONCE (arch-independent), in parallel with the backends. Its cache is
  # reused by every tar/packages job via the merge below.
  frontend:
    name: frontend (once)
    needs: [discover]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build .#frontend
        run: nix build --print-build-logs .#frontend
      - name: Dump full frontend build log on failure
        if: failure()
        run: nix log .#frontend | tee frontend-build.log
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: failure()
        with:
          name: nix-frontend-build-log
          path: frontend-build.log
          retention-days: 3
      - name: Report closure size
        run: nix path-info --closure-size --human-readable .#frontend

  # Cross-compile the backend per target, in parallel with the frontend.
  backend:
    name: backend ${{ matrix.target }}
    needs: [discover]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Cross-compile the backend
        env:
          TARGET: ${{ matrix.target }}
        run: nix build --print-build-logs ".#backend-$TARGET"
      - name: Prove the binary targets ${{ matrix.target }}
        # On a Linux x86_64 host, `file` still identifies ELF arm64/riscv64/s390x,
        # PE32+ (Windows) and Mach-O (macOS) binaries — the cross-compile is real.
        run: find -L result/bin -type f -name 'grafana*' -exec file -L {} +

  # Assemble the package tree per target, ONCE. Merges the frontend cache + this
  # target's backend cache (neither rebuilt), then pushes the tree to cachix so
  # the three sibling artifacts below each substitute it instead of rebuilding.
  pkgtree:
    name: pkgtree ${{ matrix.target }}
    needs: [discover, frontend, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build the package tree
        env:
          TARGET: ${{ matrix.target }}
        run: nix build --print-build-logs ".#pkgtree-$TARGET"

  # tar.gz per target. Depends ONLY on the package tree (a sibling of deb/rpm),
  # so it fans out in parallel with them. Tree + frontend + backend all come
  # from cachix — only the tar runs here.
  tar:
    name: tar.gz ${{ matrix.target }}
    needs: [discover, pkgtree]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.discover.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build the tar.gz
        env:
          TARGET: ${{ matrix.target }}
        run: nix build --print-build-logs ".#targz-$TARGET"
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp -L result/*.tar.gz dist/
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: nix-targz-${{ matrix.target }}
          path: dist
          retention-days: 1

  # Native Linux packages (.deb / .rpm), in parallel with each other and with
  # tar. Depends ONLY on the package tree (NOT on tar — deb/rpm never needed the
  # tarball), so it only runs fpm against the cached tree.
  packages:
    name: ${{ matrix.pkg.attr }}
    needs: [discover, pkgtree]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - uses: cachix/cachix-action@v17
        with:
          name: macabu
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build the package
        env:
          ATTR: ${{ matrix.pkg.attr }}
        run: nix build --print-build-logs ".#$ATTR"
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp -L result/* dist/
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: nix-${{ matrix.pkg.attr }}
          path: dist
          retention-days: 1
